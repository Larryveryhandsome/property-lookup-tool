<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物件查詢系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin: 10px 0;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>物件查詢系統</h1>
    <label for="idInput">輸入售版編號:</label>
    <input type="number" id="idInput" placeholder="例如: 1" onkeypress="handleKeyPress(event)">
    <button onclick="lookupProperty()">查詢</button>

    <div class="result" id="result"></div>

    <script>
        let properties = {};

        // 讀取 JSON 檔案
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                properties = data;
            })
            .catch(error => console.error('Error loading data:', error));

        function lookupProperty() {
            const id = document.getElementById("idInput").value.trim();
            const resultDiv = document.getElementById("result");

            if (properties[id]) {
                resultDiv.innerHTML = `
                    <p><strong>地址:</strong> ${properties[id].address}</p>
                    <p><strong>承辦人:</strong> ${properties[id].person}</p>
                `;
            } else {
                resultDiv.innerHTML = `<p style="color: red;">找不到該編號的資料，請確認輸入是否正確。</p>`;
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                lookupProperty();
            }
        }
    </script>
</body>
</html>
