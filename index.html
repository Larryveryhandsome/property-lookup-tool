<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物件查詢系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: white;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>物件查詢系統</h1>
    <label for="idInput">輸入售版編號：</label>
    <input type="number" id="idInput" placeholder="例如: 1" onkeypress="handleEnter(event)">
    <button onclick="lookupProperty()">查詢</button>

    <div class="result" id="result">查詢結果會顯示在這裡</div>

    <script>
        let properties = {}; // 儲存 JSON 資料

        // 從 JSON 檔案讀取資料
        fetch('https://drive.google.com/uc?export=download&id=1WZsXD9_Kccde-h_LvMeNtKDYoCstL3ss')
    .then(response => response.json())
    .then(data => {
        properties = data.reduce((obj, item) => {
            obj[item["售版編號"]] = item;
            return obj;
        }, {});
    })
    .catch(error => console.error('無法讀取 JSON 資料:', error));

        // 查詢功能
function lookupProperty() {
    const id = document.getElementById("idInput").value.trim();
    const resultDiv = document.getElementById("result");

    if (properties[id]) {
        resultDiv.innerHTML = `
            <p><strong>地址:</strong> ${properties[id].地址}</p>
            <p><strong>承辦人:</strong> ${properties[id].承辦人}</p>
        `;
    } else {
        resultDiv.innerHTML = `<p style="color: red;">尚未有物件資料，請確認輸入是否正確。</p>`;
    }
}


        // 支援按下 Enter 鍵查詢
        function handleEnter(event) {
            if (event.key === 'Enter') {
                lookupProperty();
            }
        }
    </script>
</body>
</html>
