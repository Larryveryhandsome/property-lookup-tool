<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物件查詢系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: white;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>物件查詢系統</h1>
    <label for="idInput">輸入售版編號：</label>
    <input type="number" id="idInput" placeholder="例如: 1" onkeypress="handleEnter(event)">
    <button onclick="lookupProperty()">查詢</button>

    <div class="result" id="result">查詢結果會顯示在這裡</div>


    <script
    src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous"></script>

    <script>
        let properties = {}; // 儲存 JSON 資料
        var url = `https://app.zengzhisui.com/api/lge/data`;
        $.ajax({
            url: url,
            type: 'GET',
            dataType: 'json',
            success: function (data) {
                properties = data;
                console.log(properties)
            },
            error: function (error) {
                console.log('Error:', error);
                alert('資料取得失敗')
            }
        });

        // 查詢功能
        function lookupProperty() {
            // console.log(properties)
            const id = document.getElementById("idInput").value.trim();
            const resultDiv = document.getElementById("result");

            const property = properties.find(item => item["售版編號"] === id);
            if (property) {
                resultDiv.innerHTML = `
                    <p><strong>地址:</strong> ${property["地址"]}</p>
                    <p><strong>承辦人:</strong> ${property["承辦人"]}</p>
                `;
            } else {
                resultDiv.innerHTML = `<p style="color: red;">找不到該編號的資料，請確認輸入是否正確。</p>`;
            }
        }


        // 支援按下 Enter 鍵查詢
        function handleEnter(event) {
            if (event.key === 'Enter') {
                lookupProperty();
            }
        }
    </script>
</body>
</html>
